services:
  # ─── Backend API ─────────────────────────────────────────────────────────
  - type: web
    name: postify-server
    runtime: node
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: SERVER_URL
        sync: false   # Set to your Render backend URL, e.g. https://postify-server.onrender.com
      - key: CLIENT_URL
        sync: false   # Set to your Render frontend URL, e.g. https://postify-client.onrender.com
      - key: ADMIN_EMAIL
        sync: false   # Login email for the admin account
      - key: ADMIN_PASSWORD
        sync: false   # Login password for the admin account

  # ─── Frontend (Static Site) ───────────────────────────────────────────────
  - type: web
    name: postify-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false

databases:
  - name: postify-db
    plan: free
