services:
  # ─── Backend API ─────────────────────────────────────────────────────────
  - type: web
    name: postify-server
    runtime: node
    rootDir: server
    buildCommand: cd ../client && npm install && npm run build && cd ../server && npm install && npx prisma generate && npx prisma db push
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Cap V8's heap so it garbage-collects within the 512MB container instead
      # of growing until Render's OOM-killer fires (which is what produced the
      # silent "used over 512MB" restarts). Tune with the worker's per-tick
      # memory logs: if rss stays well above heapUsed, the pressure is native
      # (Prisma / image libs), not the JS heap, and the real fix is a bigger
      # instance rather than a lower cap.
      # --expose-gc lets the publish pipeline reclaim the large native Satori/
      # resvg framebuffers between the story-card render and the ffmpeg encode
      # (see services/meta.js) so those two native-heavy stages don't peak
      # together; without it the manual global.gc() call is a no-op.
      - key: NODE_OPTIONS
        value: --max-old-space-size=384 --expose-gc
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: SERVER_URL
        sync: false   # Set to your Render backend URL, e.g. https://postify-server.onrender.com
      - key: CLIENT_URL
        sync: false   # Frontend origin(s) for CORS, no trailing slash. Comma-separate to allow several, e.g. https://rjmarketing.vlad-p.com,https://postify-client.onrender.com
      - key: ADMIN_EMAIL
        sync: false   # Login email for the admin account
      - key: ADMIN_PASSWORD
        sync: false   # Login password for the admin account

  # ─── Frontend (Static Site) ───────────────────────────────────────────────
  - type: web
    name: postify-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false

databases:
  - name: postify-db
    plan: free
